# Railway deployment config for the Next.js frontend.
#
# Create a second service in Railway pointing to the "web/" subdirectory.
# Required environment variables (set in Railway dashboard):
#   NEXT_PUBLIC_API_BASE_URL    - URL of the backend service (e.g. https://api.example.com)
#   NEXT_PUBLIC_SUPABASE_URL    - Supabase project URL
#   NEXT_PUBLIC_SUPABASE_ANON_KEY - Supabase anon/public key

[build]
builder = "nixpacks"
buildCommand = "npm install && npm run build"

[deploy]
# Next.js standalone output produces a self-contained Node server.
# Copy static assets into the standalone directory before starting.
startCommand = "cp -r .next/static .next/standalone/.next/static 2>/dev/null; HOSTNAME=0.0.0.0 PORT=${PORT:-3000} node .next/standalone/server.js"
healthcheckPath = "/"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
